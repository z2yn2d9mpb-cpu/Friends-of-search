<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAL-VP Framework — Value & Prioritisation</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;0,9..144,800;1,9..144,400&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --white:#ffffff;--bg:#f6f4f1;--bg2:#edeae5;--surface:#ffffff;
  --border:#d9d4cc;--border-lt:#e8e4de;
  --text:#2c2926;--text2:#5a554e;--text3:#8a847c;
  --green:#2a9d4e;--green-bg:#e8f5ec;--green-bd:#b8e0c4;
  --yellow:#a88b14;--yellow-bg:#faf3d8;--yellow-bd:#e8dda0;
  --orange:#c97520;--orange-bg:#fdf0e0;--orange-bd:#eacba0;
  --red:#c43d3d;--red-bg:#fce8e8;--red-bd:#e8b0b0;
  --blue:#3068a8;--blue-bg:#e6eef8;--blue-bd:#b0c8e4;
  --r:10px;--rs:6px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 12px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Source Sans 3',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;}
.wrap{max-width:1180px;margin:0 auto;padding:40px 24px 120px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ════════ COMPANY PICKER ════════ */
.home-header{text-align:center;margin-bottom:48px;animation:fadeUp .5s ease both;}
.home-header h1{font-size:2.4rem;font-weight:800;letter-spacing:-.01em;}
.home-header h1 em{font-style:normal;color:var(--green);}
.home-header .sub{font-size:1.05rem;color:var(--text2);max-width:560px;margin:8px auto 0;}
.home-header .credit{font-size:.82rem;color:var(--text3);margin-top:8px;}

.company-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;max-width:760px;margin:0 auto 32px;}
.company-card{background:var(--surface);border:1px solid var(--border-lt);border-radius:var(--r);padding:24px;box-shadow:var(--sh);cursor:pointer;transition:all .2s;position:relative;animation:fadeUp .3s ease both;}
.company-card:hover{box-shadow:var(--sh-md);transform:translateY(-3px);border-color:var(--green-bd);}
.company-card h3{font-size:1.1rem;font-weight:700;margin-bottom:6px;color:var(--text);display:flex;align-items:center;gap:8px;}
.company-card h3 .co-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.company-card .co-stats{font-size:.82rem;color:var(--text3);display:flex;gap:12px;margin-top:8px;}
.company-card .co-stat{display:flex;align-items:center;gap:4px;}
.company-card .co-stat .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.company-card .co-actions{position:absolute;top:12px;right:12px;display:flex;gap:4px;opacity:0;transition:opacity .15s;}
.company-card:hover .co-actions{opacity:1;}
.co-act-btn{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text3);padding:4px 8px;cursor:pointer;font-size:.72rem;font-family:inherit;transition:all .12s;}
.co-act-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}

.add-company-card{background:var(--bg2);border:2px dashed var(--border);border-radius:var(--r);padding:24px;cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:140px;animation:fadeUp .3s ease .1s both;}
.add-company-card:hover{border-color:var(--green);background:var(--green-bg);}
.add-company-card .plus{font-size:2rem;color:var(--green);font-weight:300;line-height:1;margin-bottom:6px;}
.add-company-card p{font-size:.9rem;color:var(--text2);font-weight:600;}

.new-company-form{max-width:480px;margin:0 auto;background:var(--surface);border:2px solid var(--green);border-radius:var(--r);padding:28px;box-shadow:var(--sh-md);animation:slideDown .25s ease both;}
.new-company-form h3{font-weight:700;font-size:1.1rem;color:var(--green);margin-bottom:16px;}

/* ════════ FRAMEWORK VIEW ════════ */
.fw-header{text-align:center;margin-bottom:40px;animation:fadeUp .4s ease both;}
.fw-header .back-link{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;color:var(--blue);font-weight:600;cursor:pointer;border:none;background:none;font-family:inherit;margin-bottom:12px;transition:color .15s;padding:6px 12px;border-radius:100px;}
.fw-header .back-link:hover{color:var(--green);background:var(--green-bg);}
.fw-header h1{font-size:2rem;font-weight:800;letter-spacing:-.01em;}
.fw-header h1 em{font-style:normal;color:var(--green);}
.fw-header .company-name{font-size:1.15rem;color:var(--text2);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px;}
.fw-header .company-name .co-icon-sm{width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;}
.fw-header .credit{font-size:.8rem;color:var(--text3);margin-top:6px;}

.layout{display:grid;grid-template-columns:340px 1fr;gap:32px;align-items:start;}
@media(max-width:900px){.layout{grid-template-columns:1fr;}.sidebar{order:2;}}

/* Sidebar */
.sidebar{position:sticky;top:24px;animation:fadeUp .5s ease .1s both;}
.sb-card{background:var(--surface);border:1px solid var(--border-lt);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--sh);}
.sb-card h3{font-size:.95rem;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.sb-card h3 .dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Source Sans 3',sans-serif;font-weight:800;font-size:.78rem;flex-shrink:0;color:#fff;}
.sb-card p{font-size:.88rem;color:var(--text2);line-height:1.55;}
.sb-card .levels{margin-top:10px;}
.sb-card .level{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border-lt);align-items:flex-start;}
.sb-card .level:last-child{border-bottom:none;}
.sb-card .level-tag{font-size:.73rem;font-weight:700;padding:2px 10px;border-radius:100px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.sb-card .level-desc{font-size:.82rem;color:var(--text2);}
.tag-green{background:var(--green-bg);color:var(--green);}
.tag-yellow{background:var(--yellow-bg);color:var(--yellow);}
.tag-red{background:var(--red-bg);color:var(--red);}
.howto{background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:var(--r);padding:20px;margin-bottom:14px;}
.howto h3{font-size:.95rem;font-weight:700;color:var(--blue);margin-bottom:10px;}
.howto .step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.howto .step:last-child{margin-bottom:0;}
.howto .sn{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.howto .step p{font-size:.85rem;color:var(--text2);}
.howto .step strong{color:var(--text);}
.prio-legend{background:var(--surface);border:1px solid var(--border-lt);border-radius:var(--r);padding:20px;box-shadow:var(--sh);}
.prio-legend h3{font-size:.95rem;font-weight:700;margin-bottom:12px;}
.prio-legend table{width:100%;border-collapse:collapse;font-size:.8rem;}
.prio-legend th{text-align:left;font-weight:600;color:var(--text3);padding:4px 6px;border-bottom:2px solid var(--border);font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;}
.prio-legend td{padding:8px 6px;border-bottom:1px solid var(--border-lt);color:var(--text2);vertical-align:top;}
.prio-legend tr:last-child td{border-bottom:none;}
.prio-legend .pb{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-weight:800;font-size:.75rem;color:#fff;}

/* Main */
.main{animation:fadeUp .5s ease .15s both;}
.goals-box{background:var(--surface);border:1px solid var(--border-lt);border-radius:var(--r);padding:22px;margin-bottom:16px;box-shadow:var(--sh);transition:box-shadow .2s;}
.goals-box:hover{box-shadow:var(--sh-md);}
.goals-box h2{font-size:1.05rem;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:9px;}
.goals-box h2 .letter{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Source Sans 3',sans-serif;font-weight:800;font-size:.82rem;color:#fff;flex-shrink:0;}
.goals-box .hint{font-size:.85rem;color:var(--text3);margin-bottom:12px;}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;min-height:24px;}
.tag{background:var(--bg);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:.88rem;display:inline-flex;align-items:center;gap:7px;transition:all .15s;}
.tag:hover{border-color:var(--text3);}
.tag button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.95rem;padding:0;line-height:1;transition:color .15s;}
.tag button:hover{color:var(--red);}
.add-row{display:flex;gap:7px;}
.add-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;color:var(--text);font-family:inherit;font-size:.88rem;outline:none;transition:border-color .15s,box-shadow .15s;}
.add-row input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg);}
.add-row input::placeholder{color:var(--text3);}
.btn{font-family:'Source Sans 3',sans-serif;font-weight:700;font-size:.85rem;padding:9px 18px;border:none;border-radius:var(--rs);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:active{transform:scale(.97);}
.btn-g{background:var(--green);color:#fff;}.btn-g:hover{background:#248a44;}
.btn-o{background:var(--surface);border:1px solid var(--border);color:var(--text2);}.btn-o:hover{border-color:var(--green);color:var(--green);}
.btn-sm{padding:6px 14px;font-size:.8rem;}
.btn-lg{padding:12px 28px;font-size:.95rem;}
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:22px;animation:fadeUp .3s ease both;}
@media(max-width:600px){.summary{grid-template-columns:repeat(3,1fr);}}
.sum-c{background:var(--surface);border:1px solid var(--border-lt);border-radius:var(--rs);padding:12px 8px;text-align:center;box-shadow:var(--sh);transition:transform .15s;}
.sum-c:hover{transform:translateY(-2px);}
.sum-c .num{font-family:'Fraunces',serif;font-weight:800;font-size:1.5rem;}
.sum-c .lbl{font-size:.72rem;color:var(--text3);}
.sum-c.c1 .num{color:var(--green);}.sum-c.c2 .num{color:var(--yellow);}.sum-c.c3 .num{color:var(--orange);}.sum-c.c4 .num{color:var(--red);}.sum-c.cr .num{color:var(--text3);}
.tasks-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.tasks-top h2{font-size:1.15rem;font-weight:700;}
.form-card{background:var(--surface);border:2px solid var(--green);border-radius:var(--r);padding:26px;margin-bottom:20px;box-shadow:var(--sh-md);animation:slideDown .25s ease both;}
.form-card h3{font-weight:700;font-size:1.1rem;color:var(--green);margin-bottom:4px;}
.form-card .form-sub{font-size:.88rem;color:var(--text3);margin-bottom:20px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:.85rem;font-weight:600;margin-bottom:4px;color:var(--text2);}
.fg label .optional{font-weight:400;color:var(--text3);}
.fg input,.fg textarea,.fg select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;color:var(--text);font-family:inherit;font-size:.9rem;outline:none;transition:border-color .15s,box-shadow .15s;}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg);}
.fg textarea{resize:vertical;min-height:56px;}
.fg select{cursor:pointer;}
.fg .field-help{font-size:.78rem;color:var(--text3);margin-top:3px;}
.divider{border:none;border-top:1px solid var(--border-lt);margin:24px 0;}
.gate{border-radius:var(--r);padding:18px;margin-bottom:14px;transition:all .2s;}
.gate-g{background:var(--green-bg);border:1px solid var(--green-bd);}
.gate-o{background:var(--blue-bg);border:1px solid var(--blue-bd);}
.gate .gate-step{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.gate-g .gate-step{color:var(--green);}.gate-o .gate-step{color:var(--blue);}
.gate .gate-q{font-weight:700;font-size:.95rem;color:var(--text);margin-bottom:3px;}
.gate .gate-help{font-size:.82rem;color:var(--text2);margin-bottom:12px;line-height:1.5;}
.gate-btns{display:flex;gap:8px;}
.gbtn{padding:8px 24px;border-radius:100px;border:1.5px solid var(--border);background:var(--white);color:var(--text);font-family:inherit;font-size:.88rem;cursor:pointer;transition:all .15s;font-weight:500;}
.gbtn:hover{border-color:var(--text3);}
.gbtn.yes{background:var(--green);color:#fff;border-color:var(--green);font-weight:700;}
.gbtn.no{background:var(--red);color:#fff;border-color:var(--red);font-weight:700;}
.rejected-msg{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--rs);padding:14px 16px;margin-bottom:14px;color:var(--red);font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:8px;animation:fadeUp .2s ease both;}
.scoring-header{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin:20px 0 12px;padding-top:16px;border-top:1px solid var(--border-lt);}
.score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;}
@media(max-width:520px){.score-grid{grid-template-columns:1fr;}}
.sc{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center;transition:border-color .2s,box-shadow .2s;}
.sc:focus-within{border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg);}
.sc .sc-letter{font-family:'Fraunces',serif;font-weight:800;font-size:1.4rem;}
.sc .sc-name{font-size:.82rem;font-weight:600;color:var(--text2);margin:2px 0 4px;}
.sc .sc-q{font-size:.78rem;color:var(--text3);font-style:italic;margin-bottom:10px;line-height:1.4;}
.sc select{width:100%;background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:8px;color:var(--text);font-family:inherit;font-size:.88rem;outline:none;cursor:pointer;text-align:center;transition:border-color .15s;}
.sc select:focus{border-color:var(--green);}
.result-box{border-radius:var(--r);padding:16px 18px;margin-bottom:14px;animation:fadeUp .2s ease both;}
.result-box .res-label{font-family:'Fraunces',serif;font-weight:800;font-size:1.1rem;margin-bottom:3px;}
.result-box .res-desc{font-size:.88rem;line-height:1.5;}
.res-p1{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);}
.res-p2{background:var(--yellow-bg);border:1px solid var(--yellow-bd);color:var(--yellow);}
.res-p3{background:var(--orange-bg);border:1px solid var(--orange-bd);color:var(--orange);}
.res-p4{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);}
.form-btns{display:flex;gap:10px;margin-top:20px;}
.task-card{background:var(--surface);border:1px solid var(--border-lt);border-radius:var(--r);padding:16px 20px;margin-bottom:10px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px;box-shadow:var(--sh);transition:all .2s;animation:fadeUp .2s ease both;}
.task-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px);}
.badge{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:800;font-size:.9rem;flex-shrink:0;color:#fff;}
.badge.p1{background:var(--green);}.badge.p2{background:var(--yellow);}.badge.p3{background:var(--orange);}.badge.p4{background:var(--red);}.badge.rejected{background:var(--text3);font-size:.65rem;}
.ti h4{font-size:.95rem;font-weight:600;margin-bottom:1px;}.ti p{font-size:.82rem;color:var(--text3);}
.ti .meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.mt{font-size:.72rem;padding:2px 10px;border-radius:100px;font-weight:600;}
.del-btn{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text3);padding:6px 12px;cursor:pointer;font-size:.78rem;font-family:inherit;transition:all .15s;}
.del-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}
.empty{text-align:center;padding:60px 20px;}
.empty .icon{font-size:2.8rem;margin-bottom:10px;opacity:.3;}
.empty p{color:var(--text3);font-size:.95rem;}
.examples-toggle{font-size:.85rem;color:var(--blue);cursor:pointer;font-weight:600;margin-top:14px;display:inline-flex;align-items:center;gap:4px;border:none;background:none;font-family:inherit;padding:6px 0;}
.examples-toggle:hover{text-decoration:underline;}
.examples-box{background:var(--bg);border:1px solid var(--border-lt);border-radius:var(--r);padding:18px;margin-top:10px;animation:fadeUp .2s ease both;}
.examples-box h4{font-size:.88rem;font-weight:700;margin-bottom:10px;}
.ex-item{padding:10px 0;border-bottom:1px solid var(--border-lt);}
.ex-item:last-child{border-bottom:none;padding-bottom:0;}
.ex-item .ex-quote{font-size:.85rem;color:var(--text2);font-style:italic;margin-bottom:4px;}
.ex-item .ex-result{font-size:.82rem;display:flex;align-items:center;gap:6px;}
.ex-item .mini-badge{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:.62rem;color:#fff;}
.loading-spinner{text-align:center;padding:80px 20px;color:var(--text3);font-size:.95rem;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
// ═══════════════════════════════════════════
// Persistent Storage helpers
// ═══════════════════════════════════════════
const DB = {
  async loadCompanies() {
    try {
      const r = await window.storage.get('goalvp-companies');
      return r ? JSON.parse(r.value) : [];
    } catch { return []; }
  },
  async saveCompanies(list) {
    try { await window.storage.set('goalvp-companies', JSON.stringify(list)); } catch(e) { console.warn('Storage save failed', e); }
  },
  async loadCompanyData(id) {
    try {
      const r = await window.storage.get('goalvp-data-' + id);
      return r ? JSON.parse(r.value) : { bGoals:[], sGoals:[], tasks:[] };
    } catch { return { bGoals:[], sGoals:[], tasks:[] }; }
  },
  async saveCompanyData(id, data) {
    try { await window.storage.set('goalvp-data-' + id, JSON.stringify(data)); } catch(e) { console.warn('Storage save failed', e); }
  },
  async deleteCompanyData(id) {
    try { await window.storage.delete('goalvp-data-' + id); } catch {}
  }
};

// ═══════════════════════════════════════════
// App State
// ═══════════════════════════════════════════
const COLORS = ['#2a9d4e','#3068a8','#c97520','#a88b14','#c43d3d','#7b5ea7','#2a8a8a','#a85530'];
const ICONS = ['🏢','🏭','🛒','💼','🎯','🚀','📊','🌐','🏪','🔧'];

let companies = [];
let view = 'home'; // 'home' | 'framework'
let activeCompanyId = null;
let showAddForm = false;
let newCoName = '';

// Framework state for active company
let S = { bGoals:[], sGoals:[], tasks:[], showForm:false, showExamples:false, form:fresh() };

function fresh() { return { name:'',requester:'',desc:'',gateG:null,gateO:null,a:'',l:'',v:'' }; }

function getCompany(id) { return companies.find(c=>c.id===id); }

// ═══════════════════════════════════════════
// Priority (unchanged)
// ═══════════════════════════════════════════
function priority(t) {
  if(t.gateG===false)return{p:'rejected',l:'Afgewezen',r:'Past niet bij de bedrijfsdoelen — niet oppakken.'};
  if(t.gateG===null)return{p:null,l:'—',r:''};
  if(t.gateO===false)return{p:'rejected',l:'Afgewezen',r:'Past niet bij de SEO-doelen — niet oppakken.'};
  if(t.gateO===null&&t.gateG===true)return{p:null,l:'—',r:'Beantwoord de SEO-doelen vraag.'};
  if(!t.a||!t.l||!t.v)return{p:null,l:'—',r:'Vul alle drie de scores in.'};
  const sc={low:1,medium:2,high:3},a=sc[t.a],l=sc[t.l],v=sc[t.v];
  if(a<=2&&l===3&&v===3)return{p:'p1',l:'P1 — Nu doen',r:'Duidelijke opbrengst en goed haalbaar. Meteen oppakken!'};
  if(v===1)return{p:'p4',l:'P4 — Niet doen',r:'Te weinig waarde. Deprioritiseer, herontwerp of stop ermee.'};
  if(a===3&&l===1)return{p:'p4',l:'P4 — Niet doen',r:'Te duur en te onzeker. Deprioritiseer, herontwerp of stop ermee.'};
  if(l>=2&&v>=2)return{p:'p2',l:'P2 — Inplannen',r:'Strategisch belangrijk. Plan het goed en zorg voor voldoende resources.'};
  return{p:'p3',l:'P3 — Kan wachten',r:'Nuttig maar niet urgent. Pak het op als er ruimte is.'};
}

// ═══════════════════════════════════════════
// Render Router
// ═══════════════════════════════════════════
function render() {
  const el = document.getElementById('app');
  if (view === 'home') el.innerHTML = renderHome();
  else if (view === 'framework') { el.innerHTML = renderFramework(); if(S.showForm) restoreFormValues(); }
}

// ═══════════════════════════════════════════
function renderHome() {

function countTasks(company) {
  const data = company._cache || { tasks:[] };
  const counts = { p1:0,p2:0,p3:0,p4:0,rejected:0,total:data.tasks?data.tasks.length:0 };
  if (data.tasks) data.tasks.forEach(t => { const p=priority(t).p; if(p&&counts[p]!==undefined)counts[p]++; });
  return counts;
}

    <div class="sum-c c4"><div class="num">${counts.p4}</div><div class="lbl">P4 · Niet doen</div></div>

function renderForm() {
  const f=S.form,passedG=f.gateG===true,passedBoth=passedG&&f.gateO===true,res=priority(f);
  let h=`<div class="form-card"><h3>Nieuwe taak beoordelen</h3>
  <p class="form-sub">Doorloop de stappen — het framework bepaalt automatisch de prioriteit.</p>
  <div class="fg"><label>Wat is de taak?</label><input id="f_name" placeholder="Bijv. Vertaalde tutorials op de site plaatsen" oninput="S.form.name=this.value"><div class="field-help">Beschrijf kort wat er gedaan moet worden</div></div>
  <div class="fg"><label>Wie vraagt dit? <span class="optional">(optioneel)</span></label><input id="f_req" placeholder="Bijv. CMO, CTO, Email manager..." oninput="S.form.requester=this.value"></div>
  <div class="fg"><label>Meer details <span class="optional">(optioneel)</span></label><textarea id="f_desc" placeholder="Achtergrond en context" oninput="S.form.desc=this.value"></textarea></div>
  <hr class="divider">
  <div class="gate gate-g"><div class="gate-step">Stap 1 van 4</div><div class="gate-q">Past deze taak bij de bedrijfsdoelen?</div>
  <div class="gate-help">Kijk naar de doelen hierboven. Draagt deze taak direct bij?</div>
  <div class="gate-btns"><button class="gbtn ${f.gateG===true?'yes':''}" onclick="setGate('gateG',true)">Ja</button>
  <button class="gbtn ${f.gateG===false?'no':''}" onclick="setGate('gateG',false)">Nee</button></div></div>`;
  if(f.gateG===false) h+=`<div class="rejected-msg">⛔ Past niet bij bedrijfsdoelen. Wijs af.</div>`;
  if(passedG){
    h+=`<div class="gate gate-o"><div class="gate-step">Stap 2 van 4</div><div class="gate-q">Past deze taak bij de SEO-doelen?</div>
    <div class="gate-help">Helpt dit je organische zoekdoelen te bereiken?</div>
    <div class="gate-btns"><button class="gbtn ${f.gateO===true?'yes':''}" onclick="setGate('gateO',true)">Ja</button>
    <button class="gbtn ${f.gateO===false?'no':''}" onclick="setGate('gateO',false)">Nee</button></div></div>`;
    if(f.gateO===false) h+=`<div class="rejected-msg">⛔ Past niet bij SEO-doelen. Wijs af.</div>`;
  }
  if(passedBoth){
    h+=`<div class="scoring-header">Stap 3 van 4 — Scoor de taak</div><div class="score-grid">
    <div class="sc"><div class="sc-letter" style="color:var(--green)">A</div><div class="sc-name">Kosten</div><div class="sc-q">Hoeveel kost het?</div>
    <select id="f_a" onchange="fSet('a',this.value)"><option value="">Kies...</option><option value="low" ${f.a==='low'?'selected':''}>Laag</option><option value="medium" ${f.a==='medium'?'selected':''}>Medium</option><option value="high" ${f.a==='high'?'selected':''}>Hoog</option></select></div>
    <div class="sc"><div class="sc-letter" style="color:var(--blue)">L</div><div class="sc-name">Haalbaarheid</div><div class="sc-q">Hoe groot is de kans?</div>
    <select id="f_l" onchange="fSet('l',this.value)"><option value="">Kies...</option><option value="high" ${f.l==='high'?'selected':''}>Hoog</option><option value="medium" ${f.l==='medium'?'selected':''}>Medium</option><option value="low" ${f.l==='low'?'selected':''}>Laag</option></select></div>
    <div class="sc"><div class="sc-letter" style="color:var(--orange)">V</div><div class="sc-name">Waarde</div><div class="sc-q">Wat levert het op?</div>
    <select id="f_v" onchange="fSet('v',this.value)"><option value="">Kies...</option><option value="high" ${f.v==='high'?'selected':''}>Hoog</option><option value="medium" ${f.v==='medium'?'selected':''}>Medium</option><option value="low" ${f.v==='low'?'selected':''}>Laag</option></select></div></div>`;
    if(res.p&&res.p!==null) h+=`<div class="result-box res-${res.p}"><div class="res-label">Stap 4 — ${res.l}</div><div class="res-desc">${res.r}</div></div>`;
  }
  h+=`<div class="form-btns"><button class="btn btn-g" onclick="saveTask()">Opslaan</button><button class="btn btn-o" onclick="cancelForm()">Annuleren</button></div></div>`;
  return h;
}

function renderTaskList() {
  if(!S.tasks.length) return '';
  const sorted=S.tasks.map((t,i)=>({...t,_i:i}));
  const ord={p1:0,p2:1,p3:2,p4:3,rejected:4};
  sorted.sort((a,b)=>(ord[priority(a).p]??5)-(ord[priority(b).p]??5));
  const nl={low:'Laag',medium:'Medium',high:'Hoog'};
  const cA={low:'tag-green',medium:'tag-yellow',high:'tag-red'};
  const cL={high:'tag-green',medium:'tag-yellow',low:'tag-red'};
  const cV={high:'tag-green',medium:'tag-yellow',low:'tag-red'};
  return sorted.map(t=>{
    const r=priority(t),p=r.p;
    return`<div class="task-card"><div class="badge ${p||''}">${p==='rejected'?'✕':r.l.split('—')[0].trim()}</div>
    <div class="ti"><h4>${esc(t.name)||'Naamloos'}</h4><p>${t.requester?'Door '+esc(t.requester)+' · ':''}${r.r}</p>
    ${p&&p!=='rejected'?`<div class="meta"><span class="mt ${cA[t.a]||''}">A: ${nl[t.a]||'?'}</span><span class="mt ${cL[t.l]||''}">L: ${nl[t.l]||'?'}</span><span class="mt ${cV[t.v]||''}">V: ${nl[t.v]||'?'}</span></div>`:''}</div>
    <button class="del-btn" onclick="rmTask(${t._i})">Verwijder</button></div>`;
  }).join('');
}

function restoreFormValues() {
  const f=S.form, set=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v;};
  set('f_name',f.name); set('f_req',f.requester); set('f_desc',f.desc);
}

// ═══════════════════════════════════════════
// Actions — Company
// ═══════════════════════════════════════════
async function createCompany() {
  const input = document.getElementById('newCoInput');
  const name = input ? input.value.trim() : newCoName.trim();
  if (!name) { if(input){input.focus();input.style.borderColor='var(--red)';setTimeout(()=>input.style.borderColor='',1500);} return; }
  const id = 'co_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  companies.push({ id, name, created: new Date().toISOString() });
  await DB.saveCompanies(companies);
  await DB.saveCompanyData(id, { bGoals:[], sGoals:[], tasks:[] });
  // Cache for home counts
  companies[companies.length-1]._cache = { tasks:[] };
  showAddForm = false;
  newCoName = '';
  render();
}

async function deleteCompany(id) {
  if (!confirm('Weet je zeker dat je dit bedrijf en alle taken wilt verwijderen?')) return;
  companies = companies.filter(c=>c.id!==id);
  await DB.saveCompanies(companies);
  await DB.deleteCompanyData(id);
  render();
}

async function openCompany(id) {
  activeCompanyId = id;
  const data = await DB.loadCompanyData(id);
  S = { bGoals:data.bGoals||[], sGoals:data.sGoals||[], tasks:data.tasks||[], showForm:false, showExamples:false, form:fresh() };
  view = 'framework';
  render();
}

async function goHome() {
  // Save current company data before leaving
  if (activeCompanyId) await saveCurrentData();
  // Reload all company caches for counts
  for (const c of companies) { c._cache = await DB.loadCompanyData(c.id); }
  view = 'home';
  showAddForm = false;
  render();
}

async function saveCurrentData() {
  if (!activeCompanyId) return;
  await DB.saveCompanyData(activeCompanyId, { bGoals:S.bGoals, sGoals:S.sGoals, tasks:S.tasks });
}

// ═══════════════════════════════════════════
// Actions — Framework (auto-save after each change)
// ═══════════════════════════════════════════
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function addBG(){const i=document.getElementById('ibg');if(i&&i.value.trim()){S.bGoals.push(i.value.trim());saveCurrentData();render();}}
function rmBG(n){S.bGoals.splice(n,1);saveCurrentData();render();}
function addSG(){const i=document.getElementById('isg');if(i&&i.value.trim()){S.sGoals.push(i.value.trim());saveCurrentData();render();}}
function rmSG(n){S.sGoals.splice(n,1);saveCurrentData();render();}
function openForm(){S.showForm=true;S.form=fresh();render();}
function cancelForm(){S.showForm=false;render();}
function fSet(k,v){S.form[k]=v;render();}
function setGate(key,val){
  S.form[key]=S.form[key]===val?null:val;
  if(key==='gateG'&&val!==true){S.form.gateO=null;S.form.a='';S.form.l='';S.form.v='';}
  if(key==='gateO'&&val!==true){S.form.a='';S.form.l='';S.form.v='';}
  render();
}
function saveTask(){
  const n=document.getElementById('f_name'),r=document.getElementById('f_req'),d=document.getElementById('f_desc');
  if(n)S.form.name=n.value;if(r)S.form.requester=r.value;if(d)S.form.desc=d.value;
  if(!S.form.name.trim()){if(n){n.focus();n.style.borderColor='var(--red)';n.style.boxShadow='0 0 0 3px var(--red-bg)';setTimeout(()=>{n.style.borderColor='';n.style.boxShadow='';},2000);}return;}
  S.tasks.push({...S.form});S.showForm=false;S.form=fresh();saveCurrentData();render();
}
function rmTask(i){S.tasks.splice(i,1);saveCurrentData();render();}
function toggleExamples(){S.showExamples=!S.showExamples;render();}

// ═══════════════════════════════════════════
// Init — load companies from storage
// ═══════════════════════════════════════════
async function init() {
  document.getElementById('app').innerHTML = '<div class="loading-spinner">Laden...</div>';
  companies = await DB.loadCompanies();
  // Load cached data for task counts on home screen
  for (const c of companies) { c._cache = await DB.loadCompanyData(c.id); }
  render();
}

init();
</script>
